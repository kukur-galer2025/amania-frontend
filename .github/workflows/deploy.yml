name: Deploy Next.js ke VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Jalankan Perintah di VPS
        uses: appleboy/ssh-action@master
        with:
          host: 31.97.51.152
          username: amania
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            # 1. Load NVM agar perintah npm/node dikenali
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # 2. Masuk ke folder project
            cd ~/htdocs/amania.id
            
            # 3. Ambil update kode terbaru dari GitHub
            git pull origin main
            
            # 4. Bersihkan sisa build lama & lock file (Anti-Error)
            rm -rf .next/lock
            rm -rf .next
            
            # 5. Install dependencies & Build aplikasi
            # Menggunakan 'npm ci' lebih stabil untuk server daripada 'npm install'
            npm install
            npm run build
            
            # 6. Manajemen Proses dengan PM2
            # Pastikan PM2 terinstall secara global
            npm install -g pm2
            
            # Cek apakah proses sudah ada, jika ada restart, jika belum buat baru
            # '|| true' memastikan script tidak berhenti jika proses belum ada
            pm2 delete amania-frontend || true
            pm2 start npm --name "amania-frontend" -- start
            
            # Simpan daftar proses agar otomatis jalan jika VPS restart
            pm2 save