name: Deploy Next.js ke VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Jalankan Perintah di VPS
        uses: appleboy/ssh-action@master
        with:
          host: 31.97.51.152
          username: amania
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd ~/htdocs/amania.id
            git pull origin main
            npm install
            npm run build
            pm2 restart all